name: Deploy to Devnet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor AVM
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force 2>&1 | tail -5
          avm install 0.31.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build SBF program
        run: |
          cargo-build-sbf --tools-version v1.52 --manifest-path programs/job-queue/Cargo.toml 2>&1 | tail -5

      - name: Build IDL
        run: |
          mkdir -p target/idl target/types
          anchor idl build -o target/idl/job_queue.json 2>&1 | tail -10
          ls -la target/idl/

      - name: Setup Solana keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Deployer: $(solana address)"

      - name: Fund deployer wallet
        run: |
          for i in 1 2 3 4 5; do
            echo "Airdrop attempt $i..."
            result=$(solana airdrop 2 2>&1) && echo "$result" && break || echo "Failed: $result"
            sleep 10
          done
          echo "Balance: $(solana balance)"

      - name: Deploy program to devnet
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/job_queue-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          
          solana program deploy \
            --program-id target/deploy/job_queue-keypair.json \
            target/deploy/job_queue.so \
            --url devnet \
            --commitment confirmed
          
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Deployed! Explorer: https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Verify deployment
        run: |
          solana program show $PROGRAM_ID --url devnet
          echo ""
          echo "✅ Program deployed to devnet: $PROGRAM_ID"
          echo "🔗 Explorer: https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Run integration tests (devnet)
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
          ANCHOR_WALLET: ~/.config/solana/id.json
        run: |
          npx ts-mocha -p ./tsconfig.json -t 120000 tests/job-queue.ts 2>&1 | tail -40
        continue-on-error: true  # Tests may fail due to devnet rate limits; deployment is the main goal
